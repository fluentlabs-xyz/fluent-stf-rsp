[workspace]
members = ["program", "script"]
resolver = "2"

[workspace.package]
edition = "2024"
version = "0.1.0"
authors = ["Your Name <you@example.com>"]

[workspace.dependencies]
serde = { version = "1.0", default-features = false }
sp1-zkvm = "3.0"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.dev]
opt-level = 1

[patch.crates-io]
# SHA2 acceleration
sha2 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", branch = "patch-sha2-v0.10.8" }
crypto-bigint = { git = "https://github.com/sp1-patches/RustCrypto-bigint", branch = "patch-v0.5.5" }
# ECDSA
ecdsa = { git = "https://github.com/sp1-patches/signatures", branch = "patch-ecdsa-v0.16.9" }

