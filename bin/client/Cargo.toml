[workspace.package]
[package]
name = "rsp-client"
description = ""
edition = "2021"

[features]
default = ["sp1"]
sp1 = [
    "dep:sp1-zkvm",
    "rsp-client-executor/sp1",
]
nitro = [
    "dep:aws-sdk-kms",
    "dep:aws-config",
    "dep:vsock",
    "dep:sha2",
    "dep:hex",
    "dep:serde_json",
    "dep:serde_bytes",
    "dep:aws-nitro-enclaves-nsm-api",
    "dep:anyhow",
    "dep:nix",
    "dep:signature",
    "dep:rand_core",
    "dep:serde_cbor",
    "dep:p256",
    "dep:aes-gcm",
    "dep:base64",
    "dep:rand",
    "dep:chrono",
    "dep:hmac",
    "dep:rustls",
    "dep:webpki-roots",
    "rsp-client-executor/nitro",
]

[dependencies]
bincode = "1.3.3"

# workspace
rsp-client-executor = { path = "../../crates/executor/client", features = [] }

# sp1
sp1-zkvm = { version = "5.1.0", optional = true }

# nitro
vsock = { version = "0.2", optional = true }
sha2 = { version = "0.10", optional = true }
hex = { version = "0.4", optional = true }
serde_json = { version = "1.0", optional = true }
serde_bytes = { version = "0.11", optional = true }
aws-nitro-enclaves-nsm-api = { version = "0.4.0", optional = true }
anyhow = { version = "1.0", optional = true }
nix = { version = "0.26.4", optional = true }
signature = { version = "2.2.0", optional = true }

# Statically turns off logging
log = { version = "0.4", features = ["max_level_off", "release_max_level_off"] }
tracing = { version = "0.1", features = ["max_level_off", "release_max_level_off"] }

rand_core = { version = "0.6.4", optional = true }
rand = { version = "0.8", optional = true }
serde = { version = "1.0.219", features = ["derive"] }
serde_cbor = { version = "0.11.2", optional = true }
p256 = { version = "0.13", features = ["ecdsa"], optional = true }
aes-gcm = { version = "0.10", optional = true }
base64 = { version = "0.21", optional = true }
chrono = { version = "0.4", default-features = false, features = ["clock"], optional = true }
hmac = { version = "0.12", optional = true }
rustls = { version = "0.21.12", default-features = false, features = ["tls12"], optional = true }
webpki-roots = { version = "0.26", optional = true }

aws-sdk-kms = { version = "1", optional = true }
aws-config = { version = "1", optional = true }

[patch.crates-io]
# Precompile patches
sha2 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha2-0.10.9-sp1-4.0.0", package = "sha2" }
bn = { git = "https://github.com/sp1-patches/bn", tag = "patch-0.6.0-sp1-5.0.0", package = "substrate-bn" }
sha3 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha3-0.10.8-sp1-4.0.0" }
k256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-k256-13.4-sp1-5.0.0" }
p256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-p256-13.2-sp1-5.0.0" }
secp256k1 = { git = "https://github.com/sp1-patches/rust-secp256k1", tag = "patch-0.30.0-sp1-5.0.0" }


