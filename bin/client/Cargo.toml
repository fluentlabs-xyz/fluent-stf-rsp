# NOTE: This is a standalone SP1 zkVM program — it is intentionally NOT part of
# the main workspace. It has its own [patch.crates-io] because sp1-zkvm programs
# require specific precompile patches that differ from the host workspace.

[package]
name = "rsp-client"
description = ""
edition = "2021"
version = "0.1.0"

[workspace]

[features]
default = ["sp1", "mainnet"]
mainnet = ["fluent-stf-primitives/mainnet", "rsp-client-executor/mainnet"]
testnet = ["fluent-stf-primitives/testnet", "rsp-client-executor/testnet"]
devnet  = ["fluent-stf-primitives/devnet", "rsp-client-executor/devnet"]
sp1 = [
    "dep:sp1-zkvm",
    "rsp-client-executor/sp1",
    "sp1-build",
    "dep:brotli",
    "dep:kzg-rs",
]
nitro = [
    "dep:vsock",
    "dep:hex",
    "dep:serde_json",
    "dep:serde_bytes",
    "dep:aws-nitro-enclaves-nsm-api",
    "dep:anyhow",
    "dep:base64",
    "dep:chrono",
    "dep:hmac",
    "dep:rustls",
    "dep:webpki-roots",
    "rsp-client-executor/nitro",
    "dep:c-kzg",
    "dep:brotli",
    "dep:hkdf",
    "dep:k256",
    "dep:sha3",
]

[dependencies]
bincode = "1.3.3"
serde = { version = "1.0", features = ["derive"] }
# Statically turns off logging
log = { version = "0.4", features = ["max_level_off", "release_max_level_off"] }
tracing = { version = "0.1", features = ["max_level_off", "release_max_level_off"] }

rsp-client-executor = { path = "../../crates/executor/client", default-features = false }
fluent-stf-primitives = { path = "../../crates/primitives", default-features = false }
nitro-types = { path = "../../crates/nitro-types" }
# sp1
sp1-zkvm = { version = "6.0.2", optional = true }

# nitro
vsock = { version = "0.5.2", optional = true }
sha2 = { version = "0.10" }
hex = { version = "0.4", optional = true }
serde_json = { version = "1.0", optional = true }
serde_bytes = { version = "0.11", optional = true }
aws-nitro-enclaves-nsm-api = { version = "0.4.0", optional = true }
anyhow = { version = "1.0", optional = true }
base64 = { version = "0.22", optional = true }
chrono = { version = "0.4", default-features = false, features = ["clock"], optional = true }
hmac = { version = "0.12", optional = true }
rustls = { version = "0.21.12", default-features = false, features = ["tls12"], optional = true }
webpki-roots = { version = "0.26", optional = true }
alloy-eips = "1.7.3"
alloy-primitives = "1.5.7"
alloy-rlp = "0.3.10"
c-kzg = { version = "2.1.7", optional = true }
brotli = {version = "8.0.2", optional = true }

# sp1 (optional)
kzg-rs = { version = "0.2.8", optional = true }

# nitro (optional)
hkdf = { version = "0.12.4", optional = true }
k256 = { version = "0.13.4", optional = true }
sha3 = { version = "0.10.8", optional = true }

[profile.release]
strip = true

[patch.crates-io]
# sp1 precompile patches
sha2 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha2-0.10.9-sp1-6.0.0", package = "sha2" }
sha3 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha3-0.10.8-sp1-6.0.0" }
k256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-k256-13.4-sp1-6.0.0" }
p256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-p256-13.2-sp1-6.0.0" }
secp256k1 = { git = "https://github.com/sp1-patches/rust-secp256k1", tag = "patch-0.30.0-sp1-6.0.0" }

# revm patches
revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-bytecode = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-database = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-state = { package = "revm-state", git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-primitives = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-interpreter = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-inspector = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-context = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-context-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
revm-database-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }
op-revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "v103-patched" }


[dev-dependencies]
reth-chainspec     = { git = "https://github.com/fluentlabs-xyz/reth", default-features = false, features = ["std"], branch = "v1.11-patched" }
tokio              = { version = "1", features = ["rt-multi-thread", "macros"] }
alloy-provider     = { version = "1.8.1", default-features = false, features = ["reqwest", "reqwest-rustls-tls"] }
alloy-network      = { version = "1.8.1", default-features = false }
alloy-consensus    = { version = "1.8.1", default-features = false }
url                = { version = "2" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
sp1-build = {version = "5", optional = true}