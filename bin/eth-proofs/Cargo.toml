[package]
name = "eth-proofs"
version.workspace = true
edition.workspace = true

[features]
default = []
sp1 = ["rsp-host-executor/sp1"]
nitro = ["rsp-host-executor/nitro"]

[dependencies]
tokio.workspace = true
url.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
serde_json.workspace = true
serde.workspace = true
eyre.workspace = true
clap.workspace = true
dotenv.workspace = true
base64.workspace = true
futures.workspace = true

reqwest = { workspace = true, features = ["json"] }
reqwest-middleware = { version = "0.3.3", features = ["json"] }
reqwest-retry = "0.6.1"
pagerduty-rs = "0.1.6"
time = "0.3.37"

# workspace
rsp-host-executor = { workspace = true, features = ["alerting"] }
rsp-client-executor.workspace = true
rsp-primitives.workspace = true
rsp-provider.workspace = true

# sp1
sp1-sdk.workspace = true

# alloy
alloy-chains.workspace = true
alloy-provider = { workspace = true, features = ["ws"] }
alloy-rpc-client.workspace = true
alloy-transport.workspace = true
alloy-transport-ws.workspace = true

[build-dependencies]
sp1-build.workspace = true
