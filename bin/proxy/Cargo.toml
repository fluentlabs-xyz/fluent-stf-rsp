[package]
name = "proxy"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

[lints]
workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["process", "macros"] }
tracing.workspace = true
tracing-subscriber.workspace = true
eyre.workspace = true
url.workspace = true
bincode.workspace = true
sha2 = "0.10.9"  # direct dep, not going through workspace patch
axum.workspace = true
zstd.workspace = true
vsock.workspace = true

# workspace crates
rsp-provider.workspace = true
rsp-host-executor = { workspace = true, features = ["sp1"] }
rsp-primitives = { workspace = true, default-features = false, features=["devnet"] }
rsp-client-executor.workspace = true
nitro-types.workspace = true

# alloy
alloy-primitives.workspace = true
alloy-provider.workspace = true
alloy-rpc-types.workspace = true
alloy-sol-types.workspace = true
alloy-signer = { version = "1.8.1", optional = true }
alloy-signer-local = { version = "1.8.1", optional = true }
alloy-network = { workspace = true, optional = true }
revm-primitives.workspace = true

# http (for beacon API)
reqwest.workspace = true

# reth
reth-chainspec.workspace = true
reth-evm-ethereum.workspace = true
reth-ethereum-primitives.workspace = true

# sp1
sp1-sdk = {workspace = true, features =["network"]}


aws-config = { version = "1"}
aws-credential-types = "1"
c-kzg = "2.1.7"

# attestation parsing deps (optional, behind feature)
ciborium = { version = "0.2.2", optional = true }
x509-parser = { version = "0.18.1", optional = true }
p384 = { version = "0.13.1", optional = true }
serde_bytes = { version = "0.11.19", optional = true }

# shared types for attestation guest input
nitro-validator-common = { path = "../aws-nitro-validator/common", package = "common", optional = true }

[features]
default=["testnet"]
devnet  = ["rsp-primitives/devnet"]
testnet = ["rsp-primitives/testnet"]
prove-key-attestation = [
    "dep:alloy-signer",
    "dep:alloy-signer-local",
    "dep:alloy-network",
    "dep:ciborium",
    "dep:x509-parser",
    "dep:p384",
    "dep:serde_bytes",
    "dep:nitro-validator-common",
]
