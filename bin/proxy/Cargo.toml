[package]
name = "proxy"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

[lints]
workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["process", "macros"] }
tracing.workspace = true
tracing-subscriber.workspace = true
eyre.workspace = true
url.workspace = true
bincode.workspace = true
sha2 = "0.10"
axum.workspace = true
vsock.workspace = true

# workspace crates
rsp-provider.workspace = true
rsp-host-executor = { workspace = true, default-features = false }
fluent-stf-primitives = { workspace = true, default-features = false }
rsp-client-executor.workspace = true
rsp-blob-builder.workspace = true
l1-rollup-client.workspace = true
nitro-types.workspace = true

# alloy
alloy-primitives.workspace = true
alloy-provider.workspace = true
alloy-rpc-types.workspace = true
alloy-sol-types.workspace = true
alloy-signer-local = "1.8.1"
alloy-network.workspace = true
revm-primitives.workspace = true

# http (for beacon API)
reqwest.workspace = true

# reth
reth-chainspec.workspace = true
reth-evm-ethereum.workspace = true
reth-ethereum-primitives.workspace = true

# sp1
sp1-sdk = {workspace = true, features =["network"]}


aws-config = { version = "1"}
aws-credential-types = "1"
c-kzg = "2.1.7"

# attestation parsing deps (always available for local execute)
ciborium = "0.2.2"
x509-parser = "0.18.1"
p384 = "0.13.1"
serde_bytes = "0.11.19"


[features]
default = ["devnet"]
mainnet = ["fluent-stf-primitives/mainnet", "rsp-host-executor/mainnet"]
testnet = ["fluent-stf-primitives/testnet", "rsp-host-executor/testnet"]
devnet  = ["fluent-stf-primitives/devnet",  "rsp-host-executor/devnet"]
prove-key-attestation = []
