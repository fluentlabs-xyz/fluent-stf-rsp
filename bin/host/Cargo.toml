[package]
name = "rsp"
version.workspace = true
edition.workspace = true

[features]
default = ["sp1"]
sp1 = ["rsp-host-executor/sp1", "dep:sp1-build", "rsp-client-executor/sp1"]
nitro = ["rsp-host-executor/nitro", "rsp-client-executor/nitro"]

[dependencies]
tokio.workspace = true
url.workspace = true
tracing-subscriber.workspace = true
serde_json.workspace = true
eyre.workspace = true
clap.workspace = true
dotenv.workspace = true
csv.workspace = true

# workspace
rsp-client-executor.workspace = true
rsp-host-executor = { workspace = true, default-features = false }
rsp-primitives.workspace = true
rsp-provider.workspace = true

# alloy
alloy-chains.workspace = true
alloy-genesis.workspace = true
alloy-primitives.workspace = true
alloy-consensus.workspace = true
alloy-provider.workspace = true

# reth
reth-primitives-traits.workspace = true

# revm
revm-bytecode.workspace = true

# sp1
sp1-sdk.workspace = true
sp1-core-executor.workspace = true
strum = "0.27"

[dev-dependencies]
alloy-network.workspace = true
rsp-client-executor.workspace = true
serde_json.workspace = true
serde.workspace = true
thousands = "0.2.0"
madato = "0.7.0"

[build-dependencies]
sp1-build = { workspace = true, optional = true }
cargo_metadata = "0.18.1"
