[package]
name = "rsp"
version.workspace = true
edition.workspace = true

[features]
default = ["sp1", "mainnet"]
sp1 = ["rsp-host-executor/sp1", "dep:sp1-build", "rsp-client-executor/sp1", "dep:sp1-sdk", "dep:sp1-core-executor", "dep:strum"]
nitro = ["rsp-host-executor/nitro", "rsp-client-executor/nitro", "dep:cargo_metadata"]
mainnet = ["rsp-host-executor/mainnet","fluent-stf-primitives/mainnet"]
testnet = ["rsp-host-executor/testnet","fluent-stf-primitives/testnet"]
devnet  = ["rsp-host-executor/devnet","fluent-stf-primitives/devnet"]

[dependencies]
tokio.workspace = true
url.workspace = true
tracing-subscriber.workspace = true
eyre.workspace = true
clap.workspace = true
dotenv.workspace = true
csv.workspace = true

fluent-stf-primitives = { workspace = true, default-features = false}

# workspace
rsp-client-executor.workspace = true
rsp-host-executor = { workspace = true, default-features = false }
rsp-provider.workspace = true

# alloy
alloy-primitives.workspace = true
alloy-consensus.workspace = true
alloy-provider.workspace = true

# reth
reth-primitives-traits.workspace = true

# revm
revm-bytecode.workspace = true

# sp1
sp1-sdk = { workspace = true, optional = true }
sp1-core-executor = { workspace = true, optional = true }
strum = { workspace = true, optional = true }





[dev-dependencies]
alloy-network.workspace = true
rsp-client-executor.workspace = true
serde_json.workspace = true
serde.workspace = true

[build-dependencies]
sp1-build = { workspace = true, optional = true }
cargo_metadata = { version = "0.18.1", optional = true }
