reth-primitives = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false, features = ["alloy-compat", "std"] }
reth-primitives-traits = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", features = ["serde", "serde-bincode-compat"], default-features = false }
reth-consensus = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-ethereum-consensus = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-optimism-consensus = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-consensus-common = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-evm = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-evm-ethereum = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
#reth-optimism-evm = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
#reth-optimism-primitives = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", features = ["serde", "serde-bincode-compat"], default-features = false }
reth-storage-errors = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-trie = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-chainspec = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", features = ["std"], default-features = false }
#reth-optimism-chainspec = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-execution-types = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-errors = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }
reth-ethereum-primitives = { git = "https://github.com/fluentlabs-xyz/fluent", features = ["serde"], branch = "stf", default-features = false }
reth-optimism-forks = { git = "https://github.com/fluentlabs-xyz/fluent", branch = "stf", default-features = false }

#revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm", branch = "devel", features = ["std"], default-features = false }
#revm-primitives = { git = "https://github.com/fluentlabs-xyz/revm-rwasm", branch = "devel", features = ["serde"], default-features = false }
#revm-bytecode = { git = "https://github.com/fluentlabs-xyz/revm-rwasm", branch = "devel", default-features = false }
#revm-database = { git = "https://github.com/fluentlabs-xyz/revm-rwasm", branch = "devel", default-features = false }
#revm-database-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm", branch = "devel", default-features = false }
#revm-state = { git = "https://github.com/fluentlabs-xyz/revm-rwasm", branch = "devel", default-features = false }

#revm = { version = "27.1.0", default-features = false }
#revm-primitives = { version = "20.2.1", default-features = false }
#revm-bytecode = { version = "6.2.1", default-features = false }
#revm-database = { version = "7.0.4", default-features = false }
#revm-database-interface = { version = "7.0.4", default-features = false }
#revm-state = { version = "7.0.4", default-features = false }

#revm = { version = "27.0.3", default-features = false }
#revm-primitives = { version = "20.0.0", default-features = false }
#revm-bytecode = { version = "6.0.1", default-features = false }
#revm-database = { version = "7.0.1", default-features = false }
#revm-database-interface = { version = "7.0.1", default-features = false }
#revm-state = { version = "7.0.1", default-features = false }


revm = { package = "revm-rwasm", version = "27.0.3", default-features = false }
revm-primitives = { package = "revm-rwasm-primitives", version = "20.0.1", default-features = false }
revm-bytecode = { package = "revm-rwasm-bytecode", version = "6.0.1", default-features = false }
revm-database = { package = "revm-rwasm-database", version = "7.0.1", default-features = false }
revm-database-interface = { package = "revm-rwasm-database-interface", version = "7.0.1", default-features = false }
revm-state = { package = "revm-rwasm-state", version = "7.0.1", default-features = false }

derive_more = { version = "2.0.1", features = ["full"] }
# alloy
alloy-chains = { version = "0.2.5", default-features = false }
alloy-evm = { version = "0.15", default-features = false, features = ["std"] }
alloy-primitives = { version = "1.3.0", default-features = false, features = ["sha3-keccak", "map-foldhash"] }
alloy-provider = { version = "1.0.23", default-features = false, features = [
    "reqwest",
    "reqwest-rustls-tls",
] }
alloy-rpc-types = { version = "1.0.23", default-features = false, features = [
    "eth",
] }
alloy-rpc-types-debug = { version = "1.0.23", default-features = false }

alloy-json-rpc = { version = "1.0.23", default-features = false }
alloy-genesis = { version = "1.0.23", default-features = false }
alloy-consensus = { version = "1.0.23", default-features = false, features = ["serde", "serde-bincode-compat"] }
alloy-network = { version = "1.0.23", default-features = false }
alloy-transport = { version = "1.0.23", default-features = false }
alloy-transport-http = { version = "1.0.23", features = [
    "reqwest-rustls-tls",
], default-features = false }
alloy-transport-ws = { version = "1.0.23" }
alloy-rpc-client = { version = "1.0.23", default-features = false }
alloy-eips = { version = "1.0.23", default-features = false }
alloy-serde = "1.0.23"
alloy-rlp = "0.3.10"
alloy-trie = "0.9.0"
alloy-sol-types = { version = "1.0.23", default-features = false }

# op
#alloy-op-evm = { version = "0.15", default-features = false }
op-alloy-consensus = "0.18.12"
op-alloy-network = "0.18.12"
op-alloy-rpc-types = "0.18.12"

[workspace.lints]
rust.missing_debug_implementations = "warn"
rust.unreachable_pub = "warn"
rust.unused_must_use = "deny"
rust.rust_2018_idioms = { level = "deny", priority = -1 }
rustdoc.all = "warn"

[patch.crates-io]
# Precompile patches
sha2 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha2-0.10.9-sp1-4.0.0", package = "sha2" }
bn = { git = "https://github.com/sp1-patches/bn", tag = "patch-0.6.0-sp1-5.0.0", package = "substrate-bn" }
sha3 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha3-0.10.8-sp1-4.0.0" }
k256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-k256-13.4-sp1-5.0.0" }
p256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-p256-13.2-sp1-5.0.0" }

revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-bytecode = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-database = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-state = { package = "revm-state", git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-primitives = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel", features = ["svm"] }
revm-interpreter = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-inspector = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-context = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-context-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
revm-database-interface = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
op-revm = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", branch = "devel" }
alloy-evm = { git = "https://github.com/fluentlabs-xyz/alloy-rwasm.git", branch = "stf", features = ["std", "svm"] }
#alloy-evm = { path = "../alloy-rwasm/crates/evm" }

revm-rwasm-precompile = { git = "https://github.com/fluentlabs-xyz/revm-rwasm.git", package = "revm-precompile", features = ["svm"] }

#[patch."https://github.com/fluentlabs-xyz/fluent"]
#reth-evm = { path = "../fluent/crates/evm/evm", default-features = false }

#[patch."https://github.com/fluentlabs-xyz/fluentbase"]
