# E2E test environment for Fluent Multi-Prover.
#
# Prerequisites:
#   - EC2 instance with Nitro Enclave support
#   - Enclave EIF started on host: `nitro-cli run-enclave --eif-path enclave.eif --cpu-count 2 --memory 1024`
#   - fluent-reth docker image with ExEx (built from fluentbase repo)
#
# Usage:
#   # 1. Start the enclave on the host
#   nitro-cli run-enclave --eif-path /path/to/enclave.eif --cpu-count 2 --memory 1024
#
#   # 2. Export required env vars
#   export API_KEY=test-key
#   export AWS_ACCESS_KEY_ID=...
#   export AWS_SECRET_ACCESS_KEY=...
#
#   # 3. Start all services
#   docker compose -f docker-compose.e2e.yml up
#
# Architecture:
#   reth-node (devnet sync) → ExEx → WitnessHub → gRPC → Courier
#     → Proxy /sign-block-execution (VSOCK → Enclave)
#     → Courier accumulates → Proxy /sign-batch-root
#     → preconfirmBatch on Anvil (fake L1)
#
# MockRollup address is deterministic on a fresh Anvil:
#   deployer = 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 (account[0]), nonce = 0
#   address  = 0x5FbDB2315678afecb367f032d93F642f64180aa3
# The test driver deploys the contract at startup. All services use the
# hardcoded address below — no two-stage startup required.

services:
  # ── Fake L1 ──────────────────────────────────────────────────────────────
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8546 --block-time 12
    ports: ["8546:8546"]
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8546"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ── Fake Beacon API ──────────────────────────────────────────────────────
  fake-beacon:
    build:
      context: .
      dockerfile: Dockerfile
      target: rsp-fake-beacon
    ports: ["5052:5052"]
    environment:
      - LISTEN_ADDR=0.0.0.0:5052
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5052/eth/v1/beacon/blob_sidecars/0"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ── Reth node with ExEx ──────────────────────────────────────────────────
  reth-node:
    image: ${FLUENT_RETH_IMAGE:-fluent-reth:latest}
    command: >
      reth node
      --chain fluent-testnet
      --datadir /data
      --http --http.addr 0.0.0.0 --http.port 8545
    volumes:
      - reth-data:/data
    ports:
      - "8545:8545"
      - "10000:10000"   # ExEx WitnessHub gRPC (used by witness-courier)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545"]
      interval: 5s
      timeout: 10s
      retries: 30

  # ── Proxy (connects to enclave via VSOCK on host) ────────────────────────
  # Uses network_mode: host because VSOCK is a virtual socket between
  # the EC2 host and the enclave — not a TCP socket.
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: rsp-proxy
    command: proxy --eif_path /enclave.eif
    network_mode: host
    environment:
      - API_KEY=${API_KEY:-test-key}
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - RPC_URL=http://127.0.0.1:8545
      - LISTEN_ADDR=0.0.0.0:8080
      - L1_RPC_URL=http://127.0.0.1:8546
      - L1_CONTRACT_ADDR=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - L1_BEACON_URL=http://127.0.0.1:5052
      - BEACON_GENESIS_TIMESTAMP=${BEACON_GENESIS_TIMESTAMP:-0}
    depends_on:
      fake-beacon:
        condition: service_healthy
      reth-node:
        condition: service_healthy

  # ── Witness Courier ──────────────────────────────────────────────────────
  # Receives block witnesses from reth-node ExEx via gRPC, forwards to proxy,
  # orchestrates batch signing, and submits preconfirmBatch to Anvil (fake L1).
  # Runs in host network mode to reach proxy (host:8080) and Anvil (host:8546).
  witness-courier:
    image: ${FLUENT_COURIER_IMAGE:-witness-courier:latest}
    network_mode: host
    depends_on:
      proxy:
        condition: service_started
      reth-node:
        condition: service_healthy
    environment:
      # gRPC address of the ExEx WitnessHub inside reth-node
      - FLUENT_WITNESS_ADDR=http://127.0.0.1:10000
      # Proxy endpoint (host network)
      - FLUENT_PROXY_URL=http://127.0.0.1:8080/sign-block-execution
      - L1_RPC_URL=http://127.0.0.1:8546
      - L1_CONTRACT_ADDR=0x5FbDB2315678afecb367f032d93F642f64180aa3
      # Anvil account[0] private key — pre-funded, used for preconfirmBatch tx
      - L1_SUBMITTER_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      # NitroVerifier not validated in mock — zero address is fine
      - NITRO_VERIFIER_ADDR=0x0000000000000000000000000000000000000000
      - FLUENT_API_KEY=${API_KEY:-secret}
      - RUST_LOG=info

  # ── E2E test driver ──────────────────────────────────────────────────────
  e2e-driver:
    build:
      context: .
      dockerfile: Dockerfile
      target: rsp-e2e-driver
    command: cargo test -p e2e-tests --test full_pipeline -- --nocapture
    environment:
      - E2E_ANVIL_URL=http://127.0.0.1:8546
      - E2E_RETH_URL=http://127.0.0.1:8545
      - E2E_BEACON_URL=http://127.0.0.1:5052
      # Pre-deployed MockRollup at the deterministic Anvil address.
      # The test driver deploys the contract first; other services use this address.
      - E2E_CONTRACT_ADDR=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - E2E_BLOCK_COUNT=${E2E_BLOCK_COUNT:-10}
      - API_KEY=${API_KEY:-test-key}
      - RUST_LOG=info
    network_mode: host
    depends_on:
      witness-courier:
        condition: service_started
      proxy:
        condition: service_started
      anvil:
        condition: service_healthy

volumes:
  reth-data:
